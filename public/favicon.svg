<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f111a"/>

  <!-- Car body -->
  <path d="M2,22 L2,19 C2,17.5 3,16.5 4.5,16.5 L6.5,12 C7,10.5 8.5,10 9.5,10 L22.5,10 C23.5,10 25,10.5 25.5,12 L27.5,16.5 C29,16.5 30,17.5 30,19 L30,22 Z"
        fill="#dc2626"/>

  <!-- Windshield / window cutout -->
  <path d="M10,16 L11.5,11.5 L20.5,11.5 L22,16 Z"
        fill="#0f111a" opacity="0.65"/>

  <!-- Wheel arch cutouts -->
  <circle cx="9" cy="22" r="4.5" fill="#0f111a"/>
  <circle cx="23" cy="22" r="4.5" fill="#0f111a"/>

  <!-- Tires -->
  <circle cx="9" cy="22" r="3.5" fill="#2a2d3e"/>
  <circle cx="23" cy="22" r="3.5" fill="#2a2d3e"/>

  <!-- Wheel hub dots -->
  <circle cx="9" cy="22" r="1.2" fill="#9ba3c0"/>
  <circle cx="23" cy="22" r="1.2" fill="#9ba3c0"/>

  <!-- Headlight -->
  <rect x="27.5" y="18" width="2" height="3" rx="0.5" fill="#fde68a"/>

  <!-- Taillight -->
  <rect x="2.5" y="18" width="2" height="3" rx="0.5" fill="#f87171"/>
</svg>
